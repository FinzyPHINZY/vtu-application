<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/bolddata.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--Start of Tawk.to Script-->
  <script type="text/javascript">
    var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
    (function () {
      var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
      s1.async = true;
      s1.src = 'https://embed.tawk.to/67a275e13a8427326079ba91/1ij99ov8p';
      s1.charset = 'UTF-8';
      s1.setAttribute('crossorigin', '*');
      s0.parentNode.insertBefore(s1, s0);
    })();

    Tawk_API.onLoad = function() {
      let tawkIcon = document.querySelector('.tawk-icon-class'); // Replace with the actual class or ID of the Tawk.to icon
      if (tawkIcon) {
        tawkIcon.style.position = 'fixed';
        tawkIcon.style.cursor = 'move';
        let offsetX = 0, offsetY = 0, mouseX, mouseY;

        tawkIcon.addEventListener('mousedown', (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
          offsetX = e.offsetX;
          offsetY = e.offsetY;
          document.addEventListener('mousemove', moveAt);
          document.addEventListener('mouseup', removeListeners);
        }, false);

        function moveAt(e) {
          tawkIcon.style.left = (e.clientX - offsetX) + 'px';
          tawkIcon.style.top = (e.clientY - offsetY) + 'px';
        }

        function removeListeners() {
          document.removeEventListener('mousemove', moveAt);
          document.removeEventListener('mouseup', removeListeners);
        }
      }
    };
  </script>
  <!--End of Tawk.to Script-->
  <title>Bold Data</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
